name: Patent Regression Test

on:
  # 매주 월요일 06:00 UTC 실행 (권장: 한국 시간 15:00)
  schedule:
    - cron: '0 6 * * 1'
  # 수동 트리거
  workflow_dispatch:

concurrency:
  group: patent-regression-${{ github.ref }}
  cancel-in-progress: false

env:
  # 특허 엔진 환경 변수 (v2.0)
  PATENT_FSM_ENABLED: true
  PATENT_VERIFICATION_ENABLED: true

jobs:
  patent-full-regression:
    name: Patent Full Regression (227 test cases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run all 227 patent test cases
        run: pnpm vitest run --reporter=verbose src/__tests__/patent/**/*.test.ts
        continue-on-error: true

      - name: Generate test report
        if: always()
        run: |
          echo "특허 회귀 테스트 실행 완료"
          echo "테스트 대상:"
          echo "  - FSM 상태 전이 (Patent 4)"
          echo "  - 설계 제약 조건 (DC-1~4)"
          echo "  - 신뢰도 점수 공식"
          echo "  - 데이터 계층 분리"
          echo "  - 인과 관계 그래프"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patent-regression-report
          path: |
            coverage/
            test-results/

  fsm-stress-test:
    name: FSM State Transition Stress Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run FSM rapid transition stress test
        run: |
          echo "FSM 빠른 상태 전이 스트레스 테스트 실행"
          pnpm vitest run --reporter=verbose src/__tests__/stress/fsm-rapid-transitions.spec.ts
        continue-on-error: true

      - name: Run FSM concurrent access stress test
        run: |
          echo "FSM 동시 접근 스트레스 테스트 실행"
          pnpm vitest run --reporter=verbose src/__tests__/stress/fsm-concurrent-access.spec.ts
        continue-on-error: true

      - name: Verify stress test invariants
        run: |
          echo "검증: FSM 상태 일관성 (모든 전이에서)"
          echo "검증: target_id NULL 불변식 (동시 접근 중)"
          echo "검증: 상태 복구 시나리오 (스트레스 후)"

      - name: Upload stress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsm-stress-test-results
          path: stress-test-results/

  confidence-boundary-test:
    name: Confidence Score Boundary Value Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run boundary tests at T1=0.7 and T2=0.4
        run: |
          echo "신뢰도 점수 경계값 테스트 실행"
          echo "  - T1 경계값: 0.7"
          echo "  - T2 경계값: 0.4"
          pnpm vitest run --reporter=verbose src/__tests__/boundary/confidence-boundaries.spec.ts
        continue-on-error: true

      - name: Verify boundary conditions
        run: |
          echo "검증: T1=0.7 미만 경우 처리"
          echo "검증: T1=0.7 이상 경우 처리"
          echo "검증: T2=0.4 미만 경우 처리"
          echo "검증: T2=0.4 이상 경우 처리"
          echo "검증: 엣지 케이스 (정확히 0.7, 정확히 0.4)"

      - name: Upload boundary test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: confidence-boundary-test-results
          path: boundary-test-results/

  report:
    name: Generate Patent Regression Report
    runs-on: ubuntu-latest
    needs: [patent-full-regression, fsm-stress-test, confidence-boundary-test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate comprehensive test report
        run: |
          echo "## 특허 회귀 테스트 보고서 (v2.0)" > PATENT_TEST_REPORT.md
          echo "" >> PATENT_TEST_REPORT.md
          echo "### 실행 일시" >> PATENT_TEST_REPORT.md
          echo "- 워크플로우 실행 시간: $(date -u)" >> PATENT_TEST_REPORT.md
          echo "- 커밋: ${{ github.sha }}" >> PATENT_TEST_REPORT.md
          echo "" >> PATENT_TEST_REPORT.md
          echo "### 테스트 범위" >> PATENT_TEST_REPORT.md
          echo "- **전체 특허 테스트 케이스**: 227개" >> PATENT_TEST_REPORT.md
          echo "  - FSM 상태 전이 테스트 (Patent 4)" >> PATENT_TEST_REPORT.md
          echo "  - 설계 제약 조건 테스트 (DC-1~4)" >> PATENT_TEST_REPORT.md
          echo "  - 신뢰도 점수 공식 검증" >> PATENT_TEST_REPORT.md
          echo "  - 데이터 계층 분리 검증" >> PATENT_TEST_REPORT.md
          echo "  - 인과 관계 그래프 검증" >> PATENT_TEST_REPORT.md
          echo "" >> PATENT_TEST_REPORT.md
          echo "- **FSM 스트레스 테스트**:" >> PATENT_TEST_REPORT.md
          echo "  - 빠른 상태 전이 (rapid transitions)" >> PATENT_TEST_REPORT.md
          echo "  - 동시 접근 (concurrent access)" >> PATENT_TEST_REPORT.md
          echo "" >> PATENT_TEST_REPORT.md
          echo "- **신뢰도 점수 경계값 테스트**:" >> PATENT_TEST_REPORT.md
          echo "  - T1 경계값 (0.7)" >> PATENT_TEST_REPORT.md
          echo "  - T2 경계값 (0.4)" >> PATENT_TEST_REPORT.md
          echo "" >> PATENT_TEST_REPORT.md
          echo "### 불변식 검증" >> PATENT_TEST_REPORT.md
          echo "- target_id NULL 불변식" >> PATENT_TEST_REPORT.md
          echo "- FSM 상태 일관성" >> PATENT_TEST_REPORT.md
          echo "- 신뢰도 점수 공식 준수" >> PATENT_TEST_REPORT.md
          echo "- 데이터 계층 분리 준수" >> PATENT_TEST_REPORT.md
          echo "" >> PATENT_TEST_REPORT.md
          echo "### 결과 요약" >> PATENT_TEST_REPORT.md
          echo "보고서가 생성되었습니다. 아래 아티팩트를 참조하세요:" >> PATENT_TEST_REPORT.md
          echo "- patent-regression-report/" >> PATENT_TEST_REPORT.md
          echo "- fsm-stress-test-results/" >> PATENT_TEST_REPORT.md
          echo "- confidence-boundary-test-results/" >> PATENT_TEST_REPORT.md

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: patent-test-summary
          path: PATENT_TEST_REPORT.md

      - name: Post report comment to PR (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('PATENT_TEST_REPORT.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Create issue with regression report (if scheduled)
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('PATENT_TEST_REPORT.md', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Patent Regression] Test Report ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['patent', 'regression-test', 'automated']
            });

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ 특허 회귀 테스트 실패",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*특허 회귀 테스트 실패*\n*커밋*: ${{ github.sha }}\n*브랜치*: ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
