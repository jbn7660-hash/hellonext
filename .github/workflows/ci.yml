name: CI v3.0

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  # Patent engine configuration (v2.0)
  PATENT_FSM_ENABLED: 'true'
  PATENT_VERIFICATION_ENABLED: 'true'
  # Cache optimization
  PNPM_HOME: ${{ runner.temp }}/.pnpm

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Cache Next.js build artifacts
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck --listFilesOnly
        timeout-minutes: 2

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm vitest run --reporter=verbose --coverage src/__tests__/unit/lib/fsm-transition.test.ts src/__tests__/unit/lib/confidence-score.test.ts src/__tests__/unit/lib/edit-delta.test.ts src/__tests__/unit/lib/data-layer-separator.test.ts

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit-tests
          path: coverage/
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm vitest run --reporter=verbose --coverage src/__tests__/integration/verification-api.spec.ts src/__tests__/integration/causal-graph-api.spec.ts

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  patent-regression-test:
    name: Patent Regression Tests (227 cases)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run patent regression test suite
        run: pnpm test:patents

      - name: Verify patent constraints (DC-1 through DC-5)
        run: pnpm test:constraints

      - name: Upload patent test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patent-test-results
          path: patent-test-results.json
          retention-days: 30

  fsm-test:
    name: FSM-Specific Tests (Patent 4, DC-5)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run FSM state transition tests
        run: pnpm vitest run --reporter=verbose src/__tests__/unit/lib/fsm-transition.test.ts src/__tests__/e2e/voice-fsm.spec.ts

      - name: Verify FSM invariants (4-state model)
        run: pnpm test:fsm-invariants

      - name: Upload FSM test traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fsm-test-traces
          path: .playwright/
          retention-days: 7

  design-constraint-test:
    name: Design Constraint Tests (DC-1~5)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify DC-1 (data layer separation)
        run: pnpm test:dc1

      - name: Verify DC-2 (confidence calculation)
        run: pnpm test:dc2

      - name: Verify DC-3 (immutability constraints)
        run: pnpm test:dc3

      - name: Verify DC-4 (scalar enforcement)
        run: pnpm test:dc4

      - name: Verify DC-5 (FSM state model)
        run: pnpm test:dc5

      - name: Upload constraint violation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: constraint-violations
          path: constraint-report.json
          retention-days: 7

  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Cache Playwright browsers
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  coverage-gate:
    name: Coverage Gate (80% threshold)
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit-tests
          path: coverage/

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi
          echo "Coverage check passed: $COVERAGE%"

  performance-gate:
    name: Performance Gate
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript compile time check
        run: |
          START=$(date +%s%N)
          pnpm typecheck
          END=$(date +%s%N)
          ELAPSED_MS=$(( ($END - $START) / 1000000 ))
          if [ $ELAPSED_MS -gt 60000 ]; then
            echo "TypeScript compilation took ${ELAPSED_MS}ms - exceeds 60s threshold"
            exit 1
          fi
          echo "TypeScript compilation took ${ELAPSED_MS}ms"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-test, integration-test, patent-regression-test, fsm-test, design-constraint-test, e2e-test, coverage-gate, performance-gate]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Cache Next.js build
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-build
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js application
        run: pnpm build
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          PATENT_FSM_ENABLED: 'true'
          PATENT_VERIFICATION_ENABLED: 'true'

      - name: Bundle analysis
        run: pnpm run analyze || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/web/.next/
            apps/web/dist/
          retention-days: 7

      - name: Comment PR with build summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const buildSize = fs.statSync('apps/web/.next').size / 1024 / 1024;
            const comment = `
            ## Build Summary
            - Build Status: ✅ Success
            - Next.js Bundle Size: ${buildSize.toFixed(2)}MB
            - All tests passed
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });
